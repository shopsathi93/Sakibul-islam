    <title>Sakibul Islam - 404</title>
    <script type="text/javascript">
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          "/index.html?/" +
          l.pathname.slice(1),
      );
    </script>
